{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <span class="soft-badge mb-3">Feedback loop</span>
                <h3>Send Feedback</h3>
                <form method="POST" action="{{ url_for('user_feedback') }}">
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" name="message" rows="5" required></textarea>
                    </div>
                    <button class="btn btn-primary">Submit Feedback</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <span class="soft-badge mb-3">Why it matters</span>
                <h5>Why feedback matters</h5>
                <p>Your input helps improve the prediction models, hospital search, and overall user experience.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
